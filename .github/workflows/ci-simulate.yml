name: Simulate 100 Agents (CI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simulate-100:
    name: Spawn 100 agents on anvil
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vv

      - name: Simulate 100-agent spawn
        run: bash scripts/simulate_100.sh
