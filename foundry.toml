[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
gas_reports = ["BovineTracking", "BovineNFT", "RanchToken"]
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Local anvil default
[profile.default.fuzz]
runs = 64

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
