specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: BovineTracking
    network: mainnet # or amoy, base-sepolia, etc.
    source:
      address: "0xYOUR_DEPLOYED_CONTRACT_ADDRESS"
      abi: BovineTracking
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Bovine
        - Vaccine
        - Movement
        - Feed
        - HealthExam
        - AbattoirProcess
      abis:
        - name: BovineTracking
          file: ./abis/BovineTracking.json
      eventHandlers:
        - event: BovineAdded(indexed uint256,string,uint256,string,string,indexed address)
          handler: handleBovineAdded
        - event: VaccineAdded(indexed uint256,string,uint256)
          handler: handleVaccineAdded
        - event: MovementAdded(indexed uint256,string,string,uint256)
          handler: handleMovementAdded
        - event: FeedAdded(indexed uint256,string,string,uint256,uint256)
          handler: handleFeedAdded
        - event: HealthExamAdded(indexed uint256,string,string,uint256)
          handler: handleHealthExamAdded
        - event: AbattoirProcessAdded(indexed uint256,string,uint256,string,uint256)
          handler: handleAbattoirProcessAdded
      file: ./src/mapping.ts

  - kind: ethereum/contract
    name: BovineNFT
    network: mainnet # or amoy, base-sepolia, etc.
    source:
      address: "0xYOUR_DEPLOYED_NFT_CONTRACT_ADDRESS"
      abi: BovineNFT
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NFTTransfer
      abis:
        - name: BovineNFT
          file: ./abis/BovineNFT.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleNFTTransfer
      file: ./src/mapping.ts
